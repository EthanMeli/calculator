<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="./css/styles.css">
  <script src="./scripts/calculator.js" defer></script>
</head>
<body>
  <h1>Calculator</h1>
  <div class="calculator">
    <div class="display">
      <div class="equation">0</div>
      <div class="result">0</div>
    </div>
    <div class="buttons">
      <div class="numbers">
        <div class="row-container">
          <div class="number">7</div>
          <div class="number">8</div>
          <div class="number">9</div>
        </div>
        <div class="row-container">
          <div class="number">4</div>
          <div class="number">5</div>
          <div class="number">6</div>  
        </div>
        <div class="row-container">
          <div class="number">1</div>
          <div class="number">2</div>
          <div class="number">3</div>  
        </div>
        <div class="row-container">
          <div class="number">0</div>
          <div class="operator equals">&equals;</div>
        </div>
      </div>
      <div class="operators">
        <div id="/" class="operator">&divide;</div>
        <div id="*" class="operator">&times;</div>
        <div id="-" class="operator">&minus;</div>
        <div id="+" class="operator">&plus;</div>
      </div>
    </div>
  </div>
</body>
</html>
